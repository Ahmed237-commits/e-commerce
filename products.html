<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري | المنتجات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body.dark-mode { background-color: #1a1a2e; }
        body.dark-mode .bg-white { background-color: #16213e; }
        body.dark-mode .bg-gray-50 { background-color: #0f172a; }
        body.dark-mode .text-gray-900 { color: #e2e8f0; }
        .toast-notification { position: fixed; bottom: 20px; left: 20px; z-index: 1000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 rounded-lg p-1.5"><svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg></div>
                    <span class="text-xl font-bold text-gray-900">متجري</span>
                </div>
                <div class="hidden md:flex gap-8">
                    <a href="index.html" class="text-gray-600 hover:text-indigo-600 transition">الرئيسية</a>
                    <a href="products.html" class="text-indigo-600 border-b-2 border-indigo-600 pb-1 font-medium">المنتجات</a>
                    <a href="about.html" class="text-gray-600 hover:text-indigo-600 transition">من نحن</a>
                    <a href="contact.html" class="text-gray-600 hover:text-indigo-600 transition">اتصل بنا</a>
                </div>
                <div class="flex gap-3">
                    <button id="darkModeToggle" class="p-2 text-gray-600 hover:text-indigo-600"><i class="fas fa-moon text-xl"></i></button>
                    <button id="cartBtn" class="p-2 text-gray-600 hover:text-indigo-600 relative"><i class="fas fa-shopping-cart text-xl"></i><span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 py-16">
        <div class="mx-auto max-w-7xl px-4 text-center text-white">
            <h1 class="text-4xl font-bold mb-4">جميع المنتجات</h1>
            <p class="text-lg">اكتشف مجموعتنا المتنوعة من المنتجات عالية الجودة</p>
        </div>
    </div>

    <div class="py-12">
        <div class="mx-auto max-w-7xl px-4">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="allProducts"></div>
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-12 mt-12">
        <div class="mx-auto max-w-7xl px-4 text-center text-gray-400">
            <p>© 2024 متجري. جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script>
        const allProducts = [
            { id: 1, name: "سماعات لاسلكية Pro", price: 79, oldPrice: 99, rating: 5, reviews: 128, image: "https://placehold.co/400x300/6366f1/white?text=سماعات" },
            { id: 2, name: "ساعة ذكية Ultra", price: 199, oldPrice: null, rating: 4, reviews: 89, image: "https://placehold.co/400x300/10b981/white?text=ساعة" },
            { id: 3, name: "حقيبة ظهر عصرية", price: 79, oldPrice: 99, rating: 5, reviews: 234, image: "https://placehold.co/400x300/f59e0b/white?text=حقيبة" },
            { id: 4, name: "حذاء جري Pro", price: 149, oldPrice: 199, rating: 4, reviews: 156, image: "https://placehold.co/400x300/ef4444/white?text=حذاء" },
            { id: 5, name: "شاحن لاسلكي", price: 39, oldPrice: 59, rating: 5, reviews: 67, image: "https://placehold.co/400x300/8b5cf6/white?text=شاحن" },
            { id: 6, name: "نظارة شمسية", price: 59, oldPrice: 89, rating: 4, reviews: 98, image: "https://placehold.co/400x300/ec489a/white?text=نظارة" },
            { id: 7, name: "سماعة بلوتوث", price: 89, oldPrice: 129, rating: 5, reviews: 312, image: "https://placehold.co/400x300/14b8a6/white?text=سماعة" },
            { id: 8, name: "قميص قطني", price: 45, oldPrice: null, rating: 4, reviews: 178, image: "https://placehold.co/400x300/06b6d4/white?text=قميص" }
        ];
        
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.quantity,0); localStorage.setItem('cart', JSON.stringify(cart)); }
        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            const existing = cart.find(i => i.id === productId);
            existing ? existing.quantity++ : cart.push({...product, quantity: 1});
            updateCartCount();
            showToast(`تم إضافة ${product.name} إلى السلة`);
        }
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg';
            toast.innerHTML = `<i class="fas fa-check-circle ml-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        function renderProducts() {
            const container = document.getElementById('allProducts');
            container.innerHTML = allProducts.map(p => `
                <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition">
                    <img src="${p.image}" class="w-full h-56 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">${p.name}</h3>
                        <div class="flex items-center gap-2 mb-3"><div class="flex text-yellow-400">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)}</div><span class="text-gray-500 text-xs">(${p.reviews})</span></div>
                        <div class="flex justify-between items-center"><div><span class="text-xl font-bold text-indigo-600">$${p.price}</span>${p.oldPrice ? `<span class="text-gray-400 line-through text-sm mr-2">$${p.oldPrice}</span>` : ''}</div>
                        <button onclick="addToCart(${p.id})" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700"><i class="fas fa-shopping-cart ml-1"></i> أضف</button></div>
                    </div>
                </div>
            `).join('');
        }
        
        function initDarkMode() {
            if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
            document.getElementById('darkModeToggle').onclick = () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            };
        }
        
        document.addEventListener('DOMContentLoaded', () => { renderProducts(); updateCartCount(); initDarkMode(); document.getElementById('cartBtn').onclick = () => showToast(`لديك ${cart.reduce((s,i)=>s+i.quantity,0)} منتج`); });
    </script>
</body>
</html>
